---
- name: Parse mail_smtp_server host
  set_fact:
    _msmtp_host: >-
      {% set _server = mail_smtp_server | default('') -%}
      {% set _colons = _server.count(':') -%}
      {% if _server.startswith('[') and ']:' in _server -%}
        {{ _server.split(']:')[0] ~ ']' }}
      {%- elif _colons == 1 -%}
        {{ _server.rsplit(':', 1)[0] }}
      {%- else -%}
        {{ _server }}
      {%- endif %}
    _msmtp_port: >-
      {% set _server = mail_smtp_server | default('') -%}
      {% set _colons = _server.count(':') -%}
      {% if _server.startswith('[') and ']:' in _server -%}
        {{ _server.split(']:')[1] }}
      {%- elif _colons == 1 -%}
        {{ _server.rsplit(':', 1)[1] }}
      {%- else -%}
        {{ msmtp_port | string }}
      {%- endif %}

- name: Validate mail_smtp_server host
  assert:
    that:
      - _msmtp_host | trim | length > 0
    fail_msg: >
      mail_smtp_server must contain a valid hostname.
      Current value: '{{ mail_smtp_server | default('') }}'

- name: Validate mail_smtp_server port is numeric
  assert:
    that:
      - _msmtp_port | trim | int(-1) >= 1
      - _msmtp_port | trim | int(-1) <= 65535
    fail_msg: >
      mail_smtp_server port must be a number between 1 and 65535.
      Parsed port: '{{ _msmtp_port | trim }}'

- name: Validate mail credentials when auth is enabled
  assert:
    that:
      - mail_user is defined and mail_user | length > 0
      - mail_password is defined and mail_password | length > 0
    fail_msg: >
      Both mail_user and mail_password must be defined when msmtp_auth is not "off".
  when: msmtp_auth | lower != "off"

- name: Validate msmtp_accounts entries
  assert:
    that:
      - item.name is defined and item.name | length > 0
      - item.host is defined and item.host | length > 0
      - item.from is defined and item.from | length > 0
    fail_msg: >
      Each msmtp account must have name, host, and from defined.
      Problem account: {{ item | default({}) }}
  loop: "{{ msmtp_accounts }}"
  loop_control:
    label: "{{ item.name | default('unnamed') }}"

- name: Validate msmtp_accounts port when specified
  assert:
    that:
      - item.port | int(-1) >= 1
      - item.port | int(-1) <= 65535
    fail_msg: >
      Account '{{ item.name }}' port must be a number between 1 and 65535.
      Current value: '{{ item.port }}'
  loop: "{{ msmtp_accounts }}"
  loop_control:
    label: "{{ item.name | default('unnamed') }}"
  when: item.port is defined

- name: Validate msmtp_accounts credentials when auth is enabled
  assert:
    that:
      - item.user is defined and item.user | length > 0
      - item.password is defined and item.password | length > 0
    fail_msg: >
      Account '{{ item.name }}' has auth enabled but is missing user or password.
  loop: "{{ msmtp_accounts }}"
  loop_control:
    label: "{{ item.name | default('unnamed') }}"
  when: (item.auth | default(msmtp_auth)) | lower != "off"

- name: Install msmtp
  apt:
    name:
      - "{{ msmtp_package }}"
      - msmtp-mta
    state: "{{ msmtp_package_state | default(apt_package_state) }}"
    cache_valid_time: "{{ apt_cache_valid_time }}"

- name: Remove ssmtp
  apt:
    name: ssmtp
    state: absent
    purge: true

- name: Remove ssmtp configuration directory
  file:
    path: /etc/ssmtp
    state: absent

- name: msmtp configuration
  template:
    src: msmtprc.j2
    dest: /etc/msmtprc
    mode: '0600'
