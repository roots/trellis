---
- name: Ensure openssl configs directory are present
  file:
    path: "{{ nginx_ssl_path }}/self-signed-openssl-configs/"
    state: directory
    mode: '0755'

- name: Template openssl configs
  template:
    src: self-signed-openssl-config.j2
    dest: "{{ nginx_ssl_path }}/self-signed-openssl-configs/{{ item.key }}.cnf"
    mode: '0644'
  loop: "{{ wordpress_sites | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  when:
    - sites_use_ssl | bool
    - ssl_enabled | bool
    - item.value.ssl.provider | default('manual') == 'self-signed'

- name: Generate self-signed certificates
  command: "openssl req -new -newkey rsa:2048 \
    -days 825 -nodes -x509 -sha256 \
    -extensions req_ext -config {{ nginx_ssl_path }}/self-signed-openssl-configs/{{ item.key }}.cnf \
    -keyout {{ item.key | quote }}.key -out {{ item.key | quote }}.cert"
  args:
    chdir: "{{ nginx_ssl_path }}"
    creates: "{{ item.key }}.*"
  loop: "{{ wordpress_sites | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  when:
    - sites_use_ssl | bool
    - ssl_enabled | bool
    - item.value.ssl.provider | default('manual') == 'self-signed'
  async: "{{ wordpress_setup_async_timeout }}"
  poll: 0
  register: wordpress_setup_self_signed_cert_jobs
  changed_when: false

- name: Wait for self-signed certificate jobs
  async_status:
    jid: "{{ item.ansible_job_id }}"
  register: wordpress_setup_self_signed_cert_job_result
  until: wordpress_setup_self_signed_cert_job_result.finished
  retries: "{{ wordpress_setup_async_retries }}"
  delay: "{{ wordpress_setup_async_poll_delay }}"
  changed_when: wordpress_setup_self_signed_cert_job_result.changed | default(false)
  loop: "{{ wordpress_setup_self_signed_cert_jobs.results | default([]) | selectattr('ansible_job_id', 'defined') | list }}"
  loop_control:
    label: "{{ item.item.key }}"
  notify: reload nginx

- name: Clean up openssl configs directory
  file:
    path: "{{ nginx_ssl_path }}/self-signed-openssl-configs/"
    state: absent
